name: realtime-voice-preview
type: service
version: 1.4.2
description: |
  Starchild Live: the user's realtime voice proxy, powered by OpenAI Realtime
  (WebRTC) and the user's Starchild capabilities. It responds as one natural
  assistant while using Agent context, memory, tools, and the selected work thread
  internally. Supports temporary-first routing and resumable background tasks with
  polling, cancellation, and reconnect recovery.
features:
  - realtime-voice-webrtc
  - function-calling-bridge
  - ask-starchild-gateway
  - temporary-first-thread-route
  - persistent-voice-thread
  - recent-work-thread-picker
  - async-background-jobs
  - job-polling-and-cancellation
  - reconnect-recovery
  - exactly-once-result-delivery
  - thread-level-serialization
  - rolling-context-for-temporary-mode
  - faithful-spoken-request-preservation
env_required:
  - OPENAI_REALTIME_API_KEY
sc_proxy: true
license: MIT
entry: src/server.py
port: 8765
author: user-2004
tags:
  - voice
  - realtime
  - openai
  - webrtc
  - starchild
  - agent-bridge
  - background-jobs
  - thread-selection
  - byok
publisher:
  code_slug: realtime-voice-preview
  public_slug: realtime-voice-preview
