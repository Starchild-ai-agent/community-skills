name: Skills Manager

on:
  pull_request:
    paths:
      - '**/SKILL.md'
      - 'skills.json'
  push:
    branches: [main]
    paths:
      - '**/SKILL.md'

jobs:
  # ─── PR Validation ─────────────────────────────────────────────────
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md files
        run: |
          set -e
          ERRORS=0

          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- '**/SKILL.md' || true)

          if [ -z "$CHANGED" ]; then
            echo "No SKILL.md files changed."
            exit 0
          fi

          for file in $CHANGED; do
            echo "::group::Checking $file"

            if [ ! -f "$file" ]; then
              echo "::warning::File $file was deleted, skipping."
              echo "::endgroup::"
              continue
            fi

            DIR_NAMESPACE=$(echo "$file" | cut -d'/' -f1)
            DIR_SLUG=$(echo "$file" | cut -d'/' -f2)

            DEPTH=$(echo "$file" | tr '/' '\n' | wc -l)
            if [ "$DEPTH" -ne 3 ]; then
              echo "::error file=$file::Invalid path depth. Expected: namespace/skill-slug/SKILL.md"
              ERRORS=$((ERRORS + 1))
              echo "::endgroup::"
              continue
            fi

            if ! head -1 "$file" | grep -q '^---'; then
              echo "::error file=$file::Missing YAML frontmatter (must start with ---)"
              ERRORS=$((ERRORS + 1))
              echo "::endgroup::"
              continue
            fi

            FM_NAME=$(sed -n '/^---$/,/^---$/p' "$file" | grep '^name:' | head -1 | sed 's/name:\s*//;s/^["'"'"']//;s/["'"'"']$//')

            if [ -z "$FM_NAME" ]; then
              echo "::error file=$file::Missing 'name' in frontmatter"
              ERRORS=$((ERRORS + 1))
              echo "::endgroup::"
              continue
            fi

            EXPECTED_NAME="@${DIR_NAMESPACE}/${DIR_SLUG}"
            if [ "$FM_NAME" != "$EXPECTED_NAME" ]; then
              echo "::error file=$file::Name mismatch: frontmatter has '$FM_NAME', expected '$EXPECTED_NAME'"
              ERRORS=$((ERRORS + 1))
            fi

            FM_VERSION=$(sed -n '/^---$/,/^---$/p' "$file" | grep '^version:' | head -1 | sed 's/version:\s*//;s/^["'"'"']//;s/["'"'"']$//')
            if [ -z "$FM_VERSION" ]; then
              echo "::error file=$file::Missing 'version' in frontmatter"
              ERRORS=$((ERRORS + 1))
            elif ! echo "$FM_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "::error file=$file::Invalid version '$FM_VERSION' (must be semver: x.y.z)"
              ERRORS=$((ERRORS + 1))
            fi

            FM_DESC=$(sed -n '/^---$/,/^---$/p' "$file" | grep '^description:' | head -1)
            if [ -z "$FM_DESC" ]; then
              echo "::error file=$file::Missing 'description' in frontmatter"
              ERRORS=$((ERRORS + 1))
            fi

            echo "✅ $file validated"
            echo "::endgroup::"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS validation error(s) found"
            exit 1
          fi

          echo "All SKILL.md files passed validation ✅"

  # ─── Post-Merge: Update skills.json index ──────────────────────────
  update-index:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild skills.json
        run: python3 scripts/build_skills_index.py

      - name: Verify skills.json coverage
        run: python3 scripts/verify_skills_index.py

      - name: Commit updated skills.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          if git diff --cached --quiet; then
            echo "No changes to skills.json"
          else
            git commit -m "chore: update skills.json index [skip ci]"
            git push
          fi
